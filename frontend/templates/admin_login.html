<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Admin Login</title>
<style>
  body { font-family: sans-serif; background: #0d1117; display: flex;
         align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px;
          padding: 40px; width: 360px; text-align: center; }
  h1 { color: #e6edf3; margin-bottom: 24px; }
  input { width: 100%; padding: 12px 16px; background: #0d1117; border: 1px solid #30363d;
          border-radius: 8px; color: #e6edf3; font-size: 1rem; margin-bottom: 16px; }
  button { width: 100%; padding: 12px; background: #0d7377; color: #fff;
           border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Admin Login</h1>
  <form method="POST">
    <input type="password" name="password" placeholder="Admin password" required>
    <button type="submit">Login</button>
  </form>
</div>
</body>
</html>
